local_costmap:
  global_frame: map # 改为map坐标系，与全局代价地图保持一致
  robot_base_frame: body_foot #机器人坐标系
 
  update_frequency: 10.0 # 提高代价地图更新频率，更快响应环境变化（原10.0）
  publish_frequency: 10.0 #代价地图的发布频率
  transform_tolerance: 3 #等待坐标变换发布信息的超时时间
 
  static_map: false  #不需要静态地图，可以提升导航效果
  rolling_window: true #是否使用动态窗口，默认为false，在静态的全局地图中，地图不会变化
  width: 8 # 进一步增大局部地图宽度，提供更大的规划空间，避免Off Map警告
  height: 8 # 进一步增大局部地图高度
  resolution: 0.05 # 局部地图分辨率 单位是 m，一般与静态地图分辨率保持一致
