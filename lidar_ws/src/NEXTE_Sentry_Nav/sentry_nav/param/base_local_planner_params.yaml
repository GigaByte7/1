 # =================== segement ===============
base_local_planner: "dwa_local_planner/DWAPlannerROS"

controller_frequency: 20      # 提高控制器频率，提高控制精度（原20.0）
# controller_patience:  15.0      # 15.0

DWAPlannerROS:
  odom_topic: Odometry
  holonomic_robot: true

  # Tolerances                  Defaults - 优化容差参数以强制路径点精确到达
  xy_goal_tolerance: 0.2       # 进一步减小位置容差，使机器人必须更精确到达每个路径点
  yaw_goal_tolerance: 0.2       # 进一步减小方向容差，提高方向精度
  latch_xy_goal_tolerance: true # 设置为false，使机器人持续微调直到完全到达每个路径点

  # Forward simulation          Defaults - 优化前向模拟参数以增强路径跟随
  use_dwa: true                 # true
  sim_time: 5.0                 # 增加模拟时间，提高规划前瞻性，选择更符合全局路径的轨迹
  sim_granularity: 0.05         # 保持模拟粒度
  angular_sim_granularity: 0.04 # 保持角速度模拟粒度
  vx_samples: 60                # 保持速度采样数40支持精细控制
  vy_samples: 70                # 保持速度采样数40充分利用全向能力
  vth_samples: 40               # 增加角速度采样数，提供更多转向选项以跟随弯曲路径20



  # Scoring                     Defaults - 优化评分参数以强制路径跟随
  path_distance_bias: 70.0    # 进一步提高路径跟随权重，强制机器人严格跟随规划路径45
  goal_distance_bias: 8.0      # 进一步降低目标导向权重，完全避免直线冲向最终目标
  occdist_scale: 0.00         # 保持障碍物代价比例
  forward_point_distance: 0.9  # 增加前视点距离，使机器人关注更远的路径点，提高路径跟随的连续性
  stop_time_buffer: 0.4        # 保持停止时间缓冲
  scaling_speed: 0.           # 保持缩放速度
  max_scaling_factor: 0.3      # 保持最大缩放因子

  # Acceleration and velocity limits - 保持现有加速度限制，不改变

  acc_limit_trans: 10
  acc_lim_x: 10.0                # 保持加速度限制
  acc_lim_y: 10.0                # 保持加速度限制
  acc_lim_theta: 2.0            # 保持角加速度限制

  max_trans_vel: 1.0 # 降低最大平移速度，使机器人更精确地跟随路径
  min_trans_vel: 0.05 # 保持最小平移速度
  max_vel_x: +1.0 # 降低X方向最大速度
  min_vel_x: 0.05 # 保持最小正向速度
  max_vel_y: +1.0 # 降低Y方向最大速度
  min_vel_y: -0.03 # 保持反向速度
  max_rot_vel: 0.6 # 提高最大旋转速度，使机器人能够快速调整方向以跟随弯曲路径0.4
  min_rot_vel: 0.05 # 保持最小旋转速度阈值0.2

  # Other                       Defaults - 优化其他参数以提高平稳性
  oscillation_reset_dist: 1.5   # 进一步提高震荡重置距离阈值，彻底避免误判震荡1
  oscillation_reset_angle: 2.0  # 进一步提高震荡重置角度阈值，彻底避免误判震荡
  prune_plan: true             # 启用路径修剪，移除不必要的路径点，减少不必要的速度调整
  trans_stopped_vel: 0.03       # 略微降低停止速度阈值，避免误判停止，但保持运动连续性
  rot_stopped_vel: 0.1         # 略微降低旋转停止速度阈值，避免误判停止，但保持转向连续性
  # publish_cost_grid_pc: true    # false


  publish_traj_pc: true
  publish_cost_grid_pc: true
  # global_frame_id: camera_init_2d
  global_frame_id: map
