base_local_planner: "dwa_local_planner/DWAPlannerROS"

controller_frequency: 20      # 提高控制器频率，提高控制精度（原20.0）
# controller_patience:  15.0      # 15.0

DWAPlannerROS:
  odom_topic: Odometry
  holonomic_robot: true

  # Tolerances                  Defaults - 优化容差参数以减少原地摆动
  xy_goal_tolerance: 0.5        # 增大位置容差，减少在目标点附近的微调，允许机器人更早认为到达目标
  yaw_goal_tolerance: 0.5       # 增大方向容差，减少方向调整的频率，避免原地旋转
  latch_xy_goal_tolerance: true # 设置为true，进入容差范围即锁定目标，避免反复微调

  # Forward simulation          Defaults - 优化前向模拟参数以提高平稳性
  use_dwa: true                 # true
  sim_time: 4.0                 # 增加模拟时间，提高规划前瞻性，选择更稳定的轨迹
  sim_granularity: 0.05         # 适当减小模拟粒度，提高轨迹精度
  angular_sim_granularity: 0.05 # 适当减小角速度模拟粒度，提高转向精度
  vx_samples: 30                # 保持适当的速度采样数，平衡计算复杂度和轨迹质量
  vy_samples: 30                # 保持适当的速度采样数
  vth_samples: 30               # 保持适当的角速度采样数



  # Scoring                     Defaults - 优化评分参数以鼓励向前运动
  path_distance_bias: 15.0     # 降低路径跟随权重，减少对路径精确跟随的要求，允许更直接向目标运动
  goal_distance_bias: 30.0     # 提高目标导向权重，鼓励机器人向目标前进，减少原地转向
  occdist_scale: 0.02          # 保持障碍物代价比例
  forward_point_distance: 0.8  # 保持前视点距离
  stop_time_buffer: 0.4        # 保持停止时间缓冲
  scaling_speed: 0.2           # 保持缩放速度
  max_scaling_factor: 0.3      # 保持最大缩放因子

  # Acceleration and velocity limits - 保持现有加速度限制，不改变

  acc_limit_trans: 10
  acc_lim_x: 10.0                # 保持加速度限制
  acc_lim_y: 10.0                # 保持加速度限制
  acc_lim_theta: 2.0            # 保持角加速度限制

  max_trans_vel: 1.0 # 保持最大平移速度
  min_trans_vel: 0.05 # 提高最小平移速度，确保机器人能启动运动，避免因速度过小被死区过滤
  max_vel_x: +1.0 # 保持X方向最大速度
  min_vel_x: 0.05 # 提高最小正向速度，确保向前运动
  max_vel_y: +1.0 # 保持Y方向最大速度
  min_vel_y: -0.03 # 保持反向速度
  max_rot_vel: 0.6 # 保持最大旋转速度
  min_rot_vel: 0.15 # 提高最小旋转速度阈值，减少微小转向调整，避免原地摆动

  # Other                       Defaults - 优化其他参数以提高平稳性
  oscillation_reset_dist: 1.0   # 进一步提高震荡重置距离阈值，彻底避免误判震荡
  oscillation_reset_angle: 2.0  # 进一步提高震荡重置角度阈值，彻底避免误判震荡
  prune_plan: true             # 启用路径修剪，移除不必要的路径点，减少不必要的速度调整
  trans_stopped_vel: 0.03       # 略微降低停止速度阈值，避免误判停止，但保持运动连续性
  rot_stopped_vel: 0.1         # 略微降低旋转停止速度阈值，避免误判停止，但保持转向连续性
  # publish_cost_grid_pc: true    # false


  publish_traj_pc: true
  publish_cost_grid_pc: true
  # global_frame_id: camera_init_2d
  global_frame_id: robot_foot_init
